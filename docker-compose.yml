version: '3.8'

services:
  api-backend:
    build:
      context: ./api_backend
      dockerfile: Dockerfile
    container_name: mcp-api-backend
    ports:
      - "8000:8000"
    env_file:
      - ./api_backend/.env

  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: mcp-server
    ports:
      - "8001:8001"
    env_file:
      - ./mcp_server/.env
    depends_on:
      - api-backend

  mcp-agent:
    build:
      context: ./mcp_agent
      dockerfile: Dockerfile
    container_name: mcp-agent
    env_file:
      - ./mcp_agent/.env
    depends_on:
      - mcp-server
